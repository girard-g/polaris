name: Delete merged branches

on:
  pull_request:
    types:
      - closed

jobs:
  delete-branch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete merged branch
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;

            // Skip deletion for branches from forks
            if (pr.head.repo.full_name !== pr.base.repo.full_name) {
              console.log(`Skipping deletion of branch '${branch}' from fork '${pr.head.repo.full_name}'.`);
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });
              console.log(`Deleted branch: ${branch}`);
            } catch (error) {
              if (error.status === 422) {
                console.log(`Branch '${branch}' is protected and cannot be deleted.`);
              } else {
                console.log(`Could not delete branch '${branch}' (HTTP ${error.status}): ${error.message}`);
              }
            }
