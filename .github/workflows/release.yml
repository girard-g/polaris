name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.artifact-name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: polaris-linux-x86_64
            binary-name: polaris

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: polaris-macos-aarch64
            binary-name: polaris

          - os: macos-13
            target: x86_64-apple-darwin
            artifact-name: polaris-macos-x86_64
            binary-name: polaris

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: polaris-windows-x86_64.exe
            binary-name: polaris.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build release binary
        run: cargo build --release

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/release/${{ matrix.binary-name }} ${{ matrix.artifact-name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: Move-Item target/release/${{ matrix.binary-name }} ${{ matrix.artifact-name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
